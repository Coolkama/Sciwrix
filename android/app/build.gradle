plugins {
    id 'com.android.application'
}

android {
    namespace 'uk.co.coolkama.sciencemd'
    compileSdk 35

    defaultConfig {
        applicationId 'uk.co.coolkama.sciencemd'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    def generatedAssetsDir = file("$buildDir/generated/sciencemdAssets")
    def generatedResDir = file("$buildDir/generated/sciencemdResources")

    sourceSets {
        main {
            assets.srcDirs += generatedAssetsDir
            res.srcDirs += generatedResDir
        }
    }

    tasks.register('copyScienceMdWebApp', Copy) {
        from(rootProject.file('../index.html'))
        into(generatedAssetsDir)
        rename { 'index.html' }
    }

    tasks.register('copyScienceMdIcon', Copy) {
        from(rootProject.file('../assets/ScienceMD-icon.png'))
        into(new File(generatedResDir, 'drawable'))
        rename { 'sciencemd_icon.png' }
    }

    tasks.named('preBuild').configure {
        dependsOn('copyScienceMdWebApp', 'copyScienceMdIcon')
    }
}
