name: Improve homepage brand focus

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/improve-home-brand-focus.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Improve homepage brand focus
        run: python3 tools/improve_home_brand_focus.py

      - name: Run smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit homepage update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- home/index.html; then
            echo "No homepage changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home/index.html
          git commit -m "Make Sciwrix prominent on homepage"
          git push origin HEAD:main

# Temporary workflow; remove after the homepage patch has landed.
