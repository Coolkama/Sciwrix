name: Apply editable Save update

on:
  workflow_dispatch:
  push:
    paths:
      - tools/editable-save-update.zip.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Apply supplied Android update
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/editable-save"
          mkdir -p "$work"
          base64 --decode tools/editable-save-update.zip.b64 > "$work/update.zip"
          unzip -q "$work/update.zip" -d "$work/files"
          cp "$work/files/android/app/src/main/java/uk/co/coolkama/sciencemd/MainActivity.java" \
            android/app/src/main/java/uk/co/coolkama/sciencemd/MainActivity.java

          python3 - <<'PY'
          from pathlib import Path

          def update(path, replacements):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              for old, new in replacements:
                  if old not in text:
                      raise SystemExit(f'Missing expected text in {path}: {old}')
                  text = text.replace(old, new)
              p.write_text(text, encoding='utf-8')

          update('android/app/build.gradle', [
              ("?: '7'", "?: '8'"),
              ("?: '1.3.1'", "?: '1.3.2'"),
          ])

          update('.github/workflows/release-android-apk.yml', [
              ("example 1.3.1", "example 1.3.2"),
              ("default: '1.3.1'", "default: '1.3.2'"),
              ("default: '7'", "default: '8'"),
              ("must look like 1.3.1", "must look like 1.3.2"),
          ])

          smoke = Path('tools/smoke_test.py')
          text = smoke.read_text(encoding='utf-8')
          text = text.replace("?: '7'", "?: '8'").replace("?: '1.3.1'", "?: '1.3.2'")
          text = text.replace('Android 1.3.1 version defaults are missing', 'Android 1.3.2 version defaults are missing')
          marker = 'require("HTMLAnchorElement.prototype.click" in activity, "web download interception is missing")\n'
          additions = (
              'require("takePersistableUriPermission" in activity, "persistent document permission handling is missing")\n'
              'require("FLAG_GRANT_WRITE_URI_PERMISSION" in activity, "document write permission is missing")\n'
              'require("currentDocumentWritable" in activity, "direct Save state is missing")\n'
              'require("forceSaveAs" in activity, "Save As distinction is missing")\n'
          )
          if additions not in text:
              if marker not in text:
                  raise SystemExit('Smoke-test insertion point was not found')
              text = text.replace(marker, marker + additions)
          smoke.write_text(text, encoding='utf-8')
          PY

      - name: Run ScienceMD smoke checks
        run: python3 tools/smoke_test.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint and build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug

      - name: Commit editable Save update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/uk/co/coolkama/sciencemd/MainActivity.java \
            android/app/build.gradle tools/smoke_test.py \
            .github/workflows/release-android-apk.yml
          git commit -m "Add editable Save behaviour and prepare 1.3.2"
          git push
