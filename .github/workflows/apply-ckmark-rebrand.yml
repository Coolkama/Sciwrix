name: Apply CKMark rebrand

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rebrand branch
        uses: actions/checkout@v4
        with:
          ref: rebrand-ckmark
          fetch-depth: 0

      - name: Apply controlled rebrand
        run: |
          python3 tools/rebrand_ckmark.py
          python3 tools/rebrand_ckmark_icon.py
          python3 -c "from pathlib import Path; p=Path('NOTICE'); p.write_text(p.read_text(encoding='utf-8').replace('ScienceMD','CKMark'), encoding='utf-8')"

      - name: Run smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit rebrand branch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No rebrand changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply CKMark rebrand"
          git push origin HEAD:rebrand-ckmark
