name: Fix Normal block style

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-normal-block-style.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Repair Normal block-style behaviour
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_visual = '''  function applyVisualBlock(kind) {
            const visual = byId('wysiwygEditor');
            if (!visual) return false;
            visual.focus({ preventScroll: true });
            const tag = kind === 'code' ? 'pre' : 'p';
            document.execCommand('formatBlock', false, tag);
            dispatchEditorInput(visual);
            return true;
          }'''

          new_visual = '''  function applyVisualBlock(kind) {
            const visual = byId('wysiwygEditor');
            if (!visual) return false;
            const tag = kind === 'code' ? '<pre>' : '<p>';

            if (typeof window.execWysiwyg === 'function') {
              window.execWysiwyg('formatBlock', tag);
              return true;
            }

            document.execCommand('formatBlock', false, tag);
            dispatchEditorInput(visual);
            return true;
          }

          function detectCurrentBlockStyle() {
            if (isSourceMode()) {
              const source = byId('editor');
              if (!source) return null;
              const text = source.value || '';
              const position = source.selectionStart ?? 0;
              const lineStart = text.lastIndexOf('\\n', Math.max(0, position - 1)) + 1;
              const nextBreak = text.indexOf('\\n', position);
              const lineEnd = nextBreak === -1 ? text.length : nextBreak;
              const line = text.slice(lineStart, lineEnd);
              if (/^#\\s+/.test(line)) return 'h1';
              if (/^##\\s+/.test(line)) return 'h2';
              if (/^###\\s+/.test(line)) return 'h3';
              if (/^>\\s?/.test(line)) return 'quote';
              const fences = text.slice(0, position).match(/^```/gm);
              if (fences && fences.length % 2 === 1) return 'code';
              return 'normal';
            }

            const visual = byId('wysiwygEditor');
            const selection = window.getSelection();
            if (!visual || !selection || !selection.rangeCount) return null;
            let node = selection.anchorNode;
            if (node && node.nodeType === Node.TEXT_NODE) node = node.parentElement;
            if (!node || !visual.contains(node)) return null;

            for (let current = node; current && current !== visual; current = current.parentElement) {
              const tag = current.tagName ? current.tagName.toLowerCase() : '';
              if (tag === 'h1' || tag === 'h2' || tag === 'h3') return tag;
              if (tag === 'blockquote') return 'quote';
              if (tag === 'pre') return 'code';
              if (tag === 'p' || tag === 'div' || tag === 'li') return 'normal';
            }
            return 'normal';
          }

          function syncBlockStyleSelect() {
            const select = byId('sciwrixBlockStyle');
            if (!select) return;
            const style = detectCurrentBlockStyle();
            if (style && Array.from(select.options).some(option => option.value === style)) {
              select.value = style;
            }
          }'''

          if text.count(old_visual) != 1:
              raise SystemExit(f'Expected one old applyVisualBlock function, found {text.count(old_visual)}')
          text = text.replace(old_visual, new_visual, 1)

          old_render = '''    if (state.activeTab === 'view') {
              const legacyStyle = byId('previewStyle');'''
          new_render = '''    if (state.activeTab === 'markdown') {
              setTimeout(syncBlockStyleSelect, 0);
            }

            if (state.activeTab === 'view') {
              const legacyStyle = byId('previewStyle');'''
          if text.count(old_render) != 1:
              raise SystemExit(f'Expected one renderToolbar view block, found {text.count(old_render)}')
          text = text.replace(old_render, new_render, 1)

          old_change = '''      if (event.target.id === 'sciwrixBlockStyle') {
                applyBlockStyle(event.target.value);
                event.target.value = 'normal';
              } else if (event.target.id === 'sciwrixDocumentStyle') {'''
          new_change = '''      if (event.target.id === 'sciwrixBlockStyle') {
                applyBlockStyle(event.target.value);
                setTimeout(syncBlockStyleSelect, 0);
              } else if (event.target.id === 'sciwrixDocumentStyle') {'''
          if text.count(old_change) != 1:
              raise SystemExit(f'Expected one block-style change handler, found {text.count(old_change)}')
          text = text.replace(old_change, new_change, 1)

          old_initialise = '''    const visual = byId('wysiwygEditor');
            if (visual) {
              visual.addEventListener('mouseup', () => {
                if (state.activeTab === 'table') setTimeout(renderToolbar, 0);
              });
              visual.addEventListener('keyup', () => {
                if (state.activeTab === 'table') setTimeout(renderToolbar, 0);
              });
            }'''
          new_initialise = '''    const visual = byId('wysiwygEditor');
            if (visual) {
              visual.addEventListener('mouseup', () => {
                if (state.activeTab === 'table') setTimeout(renderToolbar, 0);
                if (state.activeTab === 'markdown') setTimeout(syncBlockStyleSelect, 0);
              });
              visual.addEventListener('keyup', () => {
                if (state.activeTab === 'table') setTimeout(renderToolbar, 0);
                if (state.activeTab === 'markdown') setTimeout(syncBlockStyleSelect, 0);
              });
            }

            const source = byId('editor');
            if (source) {
              source.addEventListener('click', () => {
                if (state.activeTab === 'markdown') syncBlockStyleSelect();
              });
              source.addEventListener('keyup', () => {
                if (state.activeTab === 'markdown') syncBlockStyleSelect();
              });
            }

            document.addEventListener('selectionchange', () => {
              if (state.activeTab === 'markdown' && !isSourceMode()) syncBlockStyleSelect();
            });'''
          if text.count(old_initialise) != 1:
              raise SystemExit(f'Expected one visual listener block, found {text.count(old_initialise)}')
          text = text.replace(old_initialise, new_initialise, 1)

          if "event.target.value = 'normal';" in text:
              raise SystemExit('The block-style selector is still being forcibly reset to Normal')
          if "window.execWysiwyg('formatBlock', tag)" not in text:
              raise SystemExit('Normal style is not using the editor selection-preserving formatter')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Run repository smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Make Normal block style functional'
          git push origin HEAD:feature/revised-ribbon-ui
