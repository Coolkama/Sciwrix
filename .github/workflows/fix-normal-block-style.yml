name: Fix Normal block style

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-normal-block-style.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Make Normal a repeatable block-style command
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_visual = (
              "    visual.focus({ preventScroll: true });\n"
              "    const tag = kind === 'code' ? 'pre' : 'p';\n"
              "    document.execCommand('formatBlock', false, tag);"
          )
          new_visual = (
              "    const tag = kind === 'code' ? '<pre>' : '<p>';\n\n"
              "    if (typeof window.execWysiwyg === 'function') {\n"
              "      window.execWysiwyg('formatBlock', tag);\n"
              "      return true;\n"
              "    }\n\n"
              "    document.execCommand('formatBlock', false, tag);"
          )
          if old_visual in text:
              text = text.replace(old_visual, new_visual, 1)
          elif new_visual not in text:
              raise SystemExit('Could not locate the visual block-formatting code')

          old_option = '<option value="normal">Normal</option>'
          new_option = '<option value="" selected>Style</option>' + old_option
          if new_option not in text:
              if text.count(old_option) != 1:
                  raise SystemExit(f'Expected one Normal option, found {text.count(old_option)}')
              text = text.replace(old_option, new_option, 1)

          old_handler = (
              "        applyBlockStyle(event.target.value);\n"
              "        event.target.value = 'normal';"
          )
          new_handler = (
              "        const blockStyle = event.target.value;\n"
              "        if (blockStyle) applyBlockStyle(blockStyle);\n"
              "        event.target.value = '';"
          )
          if old_handler in text:
              text = text.replace(old_handler, new_handler, 1)
          elif new_handler not in text:
              raise SystemExit('Could not locate the block-style change handler')

          if "event.target.value = 'normal';" in text:
              raise SystemExit('Block-style selector still resets to Normal')
          if new_option not in text:
              raise SystemExit('Repeatable Style command selector was not created')
          if "window.execWysiwyg('formatBlock', tag)" not in text:
              raise SystemExit('Visual Normal formatting does not preserve the editor selection')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Run repository smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Make Normal block style functional'
          git push origin HEAD:feature/revised-ribbon-ui
