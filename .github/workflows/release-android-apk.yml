name: Release Sciwrix

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version, for example 1.6.2'
        required: true
        type: string
        default: '1.6.2'
      version_code:
        description: 'Android version code; must increase for every release'
        required: true
        type: string
        default: '17'
      prerelease:
        description: 'Mark this as a pre-release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify generated standalone HTML
        run: npm run build:check
      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py
      - name: Validate release inputs and signing secrets
        shell: bash
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          [[ "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || { echo '::error::Invalid version_name'; exit 1; }
          [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]] || { echo '::error::Invalid version_code'; exit 1; }
          missing=0
          for value_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!value_name:-}" ]]; then echo "::error::Required Android signing secret is missing: $value_name"; missing=1; fi
          done
          exit "$missing"
      - name: Restore Android signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sciwrix-release.jks"
      - name: Build signed Android APK
        working-directory: android
        shell: bash
        env:
          SCIENCEMD_KEYSTORE_PATH: ${{ runner.temp }}/sciwrix-release.jks
          SCIENCEMD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIENCEMD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIENCEMD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:clean :app:lintRelease :app:assembleRelease \
            -PSCIENCEMD_VERSION_NAME="${{ inputs.version_name }}" \
            -PSCIENCEMD_VERSION_CODE="${{ inputs.version_code }}"
      - name: Verify APK signature
        shell: bash
        run: |
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish portable Windows executable
        shell: pwsh
        run: dotnet publish windows/Sciwrix.Windows/Sciwrix.Windows.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ inputs.version_name }} -o windows-release
      - name: Remove build-only files and verify package
        shell: pwsh
        run: |
          Remove-Item windows-release/*.xml -ErrorAction SilentlyContinue
          if (!(Test-Path windows-release/Sciwrix.exe)) { throw 'Sciwrix.exe is missing' }
          $extra = Get-ChildItem windows-release -File | Where-Object Name -ne 'Sciwrix.exe'
          if ($extra) { throw "Unexpected Windows sidecar files: $($extra.Name -join ', ')" }
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: windows-release/Sciwrix.exe
          if-no-files-found: error

  publish:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-android
          path: incoming/android
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: incoming/windows
      - name: Package release and checksums
        shell: bash
        run: |
          set -euo pipefail
          version='${{ inputs.version_name }}'
          mkdir release
          cp incoming/android/app-release.apk "release/Sciwrix-v${version}.apk"
          cp incoming/android/app-release.apk release/Sciwrix.apk
          cp incoming/windows/Sciwrix.exe "release/Sciwrix-v${version}.exe"
          cp incoming/windows/Sciwrix.exe release/Sciwrix.exe
          cp index.html "release/Sciwrix-v${version}.html"
          cp index.html release/Sciwrix.html
          cp LICENSE NOTICE THIRD_PARTY_NOTICES.md WICKED_GOOD_XPATH_LICENSE.txt release/
          (cd release && sha256sum "Sciwrix-v${version}.apk" Sciwrix.apk "Sciwrix-v${version}.exe" Sciwrix.exe "Sciwrix-v${version}.html" Sciwrix.html > "Sciwrix-v${version}-SHA256SUMS.txt")
      - uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-v${{ inputs.version_name }}
          path: release/
          if-no-files-found: error
          retention-days: 90
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='v${{ inputs.version_name }}'
          if gh release view "$tag" >/dev/null 2>&1; then echo "::error::GitHub Release $tag already exists"; exit 1; fi
          args=(release create "$tag" release/* --target "$GITHUB_SHA" --title "Sciwrix $tag" --generate-notes)
          if [[ '${{ inputs.prerelease }}' == 'true' ]]; then args+=(--prerelease); fi
          gh "${args[@]}"
