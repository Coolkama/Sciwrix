name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version, for example 1.2.0'
        required: true
        type: string
        default: '1.2.0'
      version_code:
        description: 'Android version code; must increase for every release'
        required: true
        type: string
        default: '3'
      prerelease:
        description: 'Mark this as a pre-release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ScienceMD smoke checks
        run: python3 tools/smoke_test.py

      - name: Validate release inputs and signing secrets
        shell: bash
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version_name must look like 1.2.0"
            exit 1
          fi

          if [[ ! "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::version_code must be a positive integer"
            exit 1
          fi

          missing=0
          for value_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!value_name:-}" ]]; then
              echo "::error::Required Android signing secret is missing: $value_name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Restore Android signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sciencemd-release.jks"
          test -s "$RUNNER_TEMP/sciencemd-release.jks"

      - name: Build signed release APK
        working-directory: android
        shell: bash
        env:
          SCIENCEMD_KEYSTORE_PATH: ${{ runner.temp }}/sciencemd-release.jks
          SCIENCEMD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIENCEMD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIENCEMD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon :app:clean :app:lintRelease :app:assembleRelease \
            -PSCIENCEMD_VERSION_NAME="$VERSION_NAME" \
            -PSCIENCEMD_VERSION_CODE="$VERSION_CODE"

      - name: Verify, rename and checksum APK
        id: package
        shell: bash
        env:
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          set -euo pipefail

          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          release_dir="$RUNNER_TEMP/sciencemd-release"
          release_apk="$release_dir/ScienceMD-v${VERSION_NAME}.apk"
          checksum_file="$release_apk.sha256"

          mkdir -p "$release_dir"
          cp "$source_apk" "$release_apk"

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs "$release_apk"
          sha256sum "$release_apk" > "$checksum_file"

          echo "apk=$release_apk" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum_file" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload signed release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScienceMD-v${{ inputs.version_name }}
          path: |
            ${{ steps.package.outputs.apk }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.package.outputs.tag }}
          APK: ${{ steps.package.outputs.apk }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::GitHub Release $TAG already exists"
            exit 1
          fi

          args=(
            release create "$TAG"
            "$APK"
            "$CHECKSUM"
            --target "$GITHUB_SHA"
            --title "ScienceMD $TAG"
            --generate-notes
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
