name: Apply revised ribbon UI

on:
  workflow_dispatch:
  push:
    branches:
      - feature/revised-ribbon-ui
    paths:
      - tools/apply_revised_ribbon_ui.py
      - .github/workflows/apply-revised-ribbon-ui.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply revised ribbon interface
        run: python3 tools/apply_revised_ribbon_ui.py

      - name: Run smoke tests
        run: python3 tools/smoke_test.py

      - name: Verify ribbon markers
        run: |
          grep -q 'sciwrix-ribbon-ui-styles' index.html
          grep -q 'sciwrix-ribbon-ui-script' index.html

      - name: Commit patched application
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Implement revised ribbon interface"
          git push origin HEAD:feature/revised-ribbon-ui
