name: Apply undo and redo feature

on:
  push:
    branches:
      - main
    paths:
      - '.github/triggers/apply-undo-redo'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply undo and redo patch
        run: python tools/add_undo_redo.py

      - name: Validate embedded application script
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          source = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', source, re.S)
          Path('science-md-app.js').write_text(max(scripts, key=len), encoding='utf-8')
          PY
          node --check science-md-app.js

      - name: Commit updated ScienceMD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Add undo and redo editing history"
            git push
          fi
