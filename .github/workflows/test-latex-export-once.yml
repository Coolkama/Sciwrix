name: Test LaTeX export once

on:
  push:
    branches:
      - feature/latex-output
    paths:
      - .github/workflows/test-latex-export-once.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/latex-output
      - run: python3 tools/smoke_test.py
      - run: node tools/test_latex_export.js
