name: Fix homepage CSS keywords

on:
  push:
    paths:
      - .github/workflows/fix-homepage-css.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct CSS keywords
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('home/index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('scroll-behaviour:', 'scroll-behavior:')
          text = text.replace('text-align: centre', 'text-align: center')
          text = text.replace('place-items: centre', 'place-items: center')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Verify homepage
        run: |
          grep -q '<title>ScienceMD' home/index.html
          ! grep -q 'centre\|scroll-behaviour' home/index.html
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home/index.html
          git commit -m "Correct ScienceMD homepage CSS keywords"
          git push
