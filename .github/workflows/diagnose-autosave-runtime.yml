name: Diagnose autosave runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-autosave-runtime.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Extract focused runtime contexts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          terms = [
              'updateFullscreenButton',
              'isFullscreenActive',
              'showToast(',
              '<iframe',
              "createElement('iframe')",
              'createElement("iframe")',
              'contentDocument',
              'contentWindow',
              'window.frames',
              '.src =',
              '.src=',
              'location.href',
              'document.location',
              'window.location',
              'previewPanel',
              'printPreview',
              'safeGetStorage(STORAGE_KEY',
              'safeSetStorage(STORAGE_KEY',
          ]
          out = []
          for term in terms:
              out.append(f'\n===== {term} =====\n')
              positions = [m.start() for m in re.finditer(re.escape(term), text, flags=re.I)]
              if not positions:
                  out.append('[none]\n')
                  continue
              for count, pos in enumerate(positions[:20], 1):
                  lo = max(0, pos - 1200)
                  hi = min(len(text), pos + 1800)
                  out.append(f'\n--- occurrence {count} at {pos} ---\n{text[lo:hi]}\n')
              if len(positions) > 20:
                  out.append(f'\n[truncated: {len(positions)} total occurrences]\n')

          Path('_runtime_diagnostic.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _runtime_diagnostic.txt
          git commit -m 'Refresh temporary autosave runtime diagnostic'
          git push origin HEAD:feature/revised-ribbon-ui
