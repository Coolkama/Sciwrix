name: Apply LaTeX export once

on:
  push:
    branches:
      - feature/latex-output
    paths:
      - .github/workflows/apply-latex-export-once.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/latex-output
          fetch-depth: 0

      - name: Apply LaTeX export patch
        run: python3 tools/apply_latex_export.py

      - name: Run ScienceMD smoke tests
        run: python3 tools/smoke_test.py

      - name: Check application JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>([\s\S]*?)</script>', html, flags=re.IGNORECASE)
          if not scripts:
              raise SystemExit('No scripts found in index.html')
          Path('/tmp/sciencemd-app.js').write_text(scripts[-1], encoding='utf-8')
          print(f'Checking final application script: {len(scripts[-1])} characters')
          PY
          node --check /tmp/sciencemd-app.js

      - name: Verify LaTeX export markers
        run: |
          grep -F 'value="latex"' index.html
          grep -F 'function buildLatexDocument()' index.html
          grep -F '\documentclass[11pt,a4paper]{article}' index.html
          grep -F 'application/x-tex;charset=utf-8' index.html

      - name: Commit implementation
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tools/smoke_test.py
          git commit -m "Add LaTeX output to Save As"
          git push origin feature/latex-output
