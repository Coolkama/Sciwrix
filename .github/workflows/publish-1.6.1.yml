name: Publish Sciwrix 1.6.1

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-1.6.1.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update 1.6.1 release defaults
        run: |
          python3 - <<'PY'
          from pathlib import Path

          smoke = Path('tools/smoke_test.py')
          text = smoke.read_text(encoding='utf-8')
          text = text.replace("require(\"?: '15'\" in gradle and \"?: '1.6.0'\" in gradle, \"Android 1.6.0 version defaults are missing\")", "require(\"?: '16'\" in gradle and \"?: '1.6.1'\" in gradle, \"Android 1.6.1 version defaults are missing\")")
          smoke.write_text(text, encoding='utf-8')

          release = Path('.github/workflows/release-android-apk.yml')
          text = release.read_text(encoding='utf-8')
          text = text.replace("description: 'Release version, for example 1.6.0'", "description: 'Release version, for example 1.6.1'")
          text = text.replace("default: '1.6.0'", "default: '1.6.1'")
          text = text.replace("default: '15'", "default: '16'")
          text = text.replace('version_name must look like 1.6.0', 'version_name must look like 1.6.1')
          release.write_text(text, encoding='utf-8')
          PY

      - name: Commit release defaults
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/smoke_test.py .github/workflows/release-android-apk.yml
          git commit -m 'Prepare Sciwrix 1.6.1 release defaults'
          git push origin main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py

      - name: Verify release notices
        run: |
          test -s LICENSE
          test -s NOTICE
          test -s THIRD_PARTY_NOTICES.md
          test -s WICKED_GOOD_XPATH_LICENSE.txt

      - name: Restore Android signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sciwrix-release.jks"
          test -s "$RUNNER_TEMP/sciwrix-release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          SCIENCEMD_KEYSTORE_PATH: ${{ runner.temp }}/sciwrix-release.jks
          SCIENCEMD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIENCEMD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIENCEMD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:clean :app:lintRelease :app:assembleRelease -PSCIENCEMD_VERSION_NAME=1.6.1 -PSCIENCEMD_VERSION_CODE=16

      - name: Package and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/sciwrix-release"
          mkdir -p "$release_dir"
          cp android/app/build/outputs/apk/release/app-release.apk "$release_dir/Sciwrix-v1.6.1.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$release_dir/Sciwrix.apk"
          cp index.html "$release_dir/Sciwrix-v1.6.1.html"
          cp index.html "$release_dir/Sciwrix.html"
          (cd "$release_dir" && sha256sum Sciwrix-v1.6.1.apk Sciwrix.apk Sciwrix-v1.6.1.html Sciwrix.html > Sciwrix-v1.6.1-SHA256SUMS.txt)
          gh release create v1.6.1 \
            "$release_dir/Sciwrix-v1.6.1.apk" \
            "$release_dir/Sciwrix.apk" \
            "$release_dir/Sciwrix-v1.6.1.html" \
            "$release_dir/Sciwrix.html" \
            "$release_dir/Sciwrix-v1.6.1-SHA256SUMS.txt" \
            LICENSE NOTICE THIRD_PARTY_NOTICES.md WICKED_GOOD_XPATH_LICENSE.txt \
            --target main \
            --title 'Sciwrix v1.6.1' \
            --notes 'Fixed mobile editor width overflow; Markdown now wraps to the viewport without horizontal scrolling; switching between WYSIWYG and Markdown preserves document position; refreshed homepage screenshots.'
