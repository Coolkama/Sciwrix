name: Extract New Document debug

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/extract-new-document-debug.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract relevant HTML sections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          lines = path.read_text(encoding='utf-8').splitlines()
          terms = [
              'starterText',
              'new document',
              'New Document',
              'confirm(',
              'newBtn',
              'newFile',
              'createNew',
              'resetDocument',
          ]

          hits = set()
          for i, line in enumerate(lines):
              if any(term in line for term in terms):
                  for j in range(max(0, i - 18), min(len(lines), i + 35)):
                      hits.add(j)

          out = []
          last = None
          for i in sorted(hits):
              if last is not None and i > last + 1:
                  out.append('\n---\n')
              out.append(f'{i+1:05d}: {lines[i]}')
              last = i

          Path('tools/new-document-debug.txt').write_text('\n'.join(out), encoding='utf-8')
          PY

      - name: Commit debug extract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/new-document-debug.txt
          git commit -m "Extract New Document handler for debugging"
          git push
