name: Apply New Document reset fix

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/extract-new-document-debug.yml
      - tools/fix_new_document_reset.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Apply New Document repair
        run: python3 tools/fix_new_document_reset.py

      - name: Run ScienceMD smoke checks
        run: python3 tools/smoke_test.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint and build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug

      - name: Commit maintained ScienceMD files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html home/index.html tools/smoke_test.py .github/workflows/release-android-apk.yml
          git commit -m "Add licences and release acknowledgements" || exit 0
          git push
