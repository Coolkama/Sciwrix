name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/revised-ribbon-ui
    paths:
      - 'index.html'
      - 'android/**'
      - 'tools/smoke_test.py'
      - '.github/workflows/build-android-apk.yml'
  pull_request:
    branches:
      - main
      - automation/autosave-repair-base
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Restore autosave startup helpers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')

          helper_markers = [
              '    function showToast(message) {',
              '    function isFullscreenActive() {',
              '    function updateFullscreenButton() {',
          ]
          present = [marker in text for marker in helper_markers]
          if any(present) and not all(present):
              raise SystemExit(f'Fullscreen helper set is incomplete: {present}')

          if not all(present):
              needle = '    async function toggleFullscreen() {'
              if text.count(needle) != 1:
                  raise SystemExit(f'Expected one toggleFullscreen function, found {text.count(needle)}')
              helpers = '''    function showToast(message) {
              clearTimeout(toastTimer);
              toast.textContent = message;
              toast.classList.add('show');
              toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            function isFullscreenActive() {
              return !!(document.fullscreenElement || document.webkitFullscreenElement);
            }

            function updateFullscreenButton() {
              if (!fullscreenBtn) return;
              fullscreenBtn.textContent = isFullscreenActive() ? '×' : '⛶';
              fullscreenBtn.setAttribute('aria-label', isFullscreenActive() ? 'Exit fullscreen' : 'Enter fullscreen');
              fullscreenBtn.setAttribute('title', isFullscreenActive() ? 'Exit fullscreen' : 'Enter fullscreen');
            }

'''
              text = text.replace(needle, helpers + needle, 1)

          for marker in helper_markers:
              if marker not in text:
                  raise SystemExit(f'Missing helper after repair: {marker}')
          if 'const restoredDraft = safeGetStorage(STORAGE_KEY, starterText) || starterText;' not in text:
              raise SystemExit('Autosave restore code is missing')

          index_path.write_text(text, encoding='utf-8')
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py

      - name: Lint and build debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Commit runtime repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'Runtime helpers already present.'
          else
            git commit -m 'Restore autosave startup and fullscreen helpers'
            git push origin HEAD:feature/revised-ribbon-ui
          fi
