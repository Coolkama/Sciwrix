name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'android/**'
      - 'tools/smoke_test.py'
      - '.github/workflows/build-android-apk.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'index.html'
      - 'android/**'
      - 'tools/smoke_test.py'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py

      - name: Lint and build debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
