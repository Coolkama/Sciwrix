name: Repair ribbon runtime

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/repair-ribbon-runtime.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Restore fullscreen function boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          needle = ';\n      const target = document.documentElement;\n\n      try {'
          replacement = ';\n\n    async function toggleFullscreen() {\n      const target = document.documentElement;\n\n      try {'
          count = text.count(needle)
          if count != 1:
              raise SystemExit(f'Expected one damaged fullscreen boundary, found {count}')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8')
          PY

      - name: Run repository smoke checks
        run: python3 tools/smoke_test.py

      - name: Validate all inline JavaScript
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import subprocess
          import tempfile

          class Scripts(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.capture = False
                  self.current = []
                  self.scripts = []
                  self.attrs = {}
              def handle_starttag(self, tag, attrs):
                  if tag.lower() == 'script':
                      self.attrs = dict(attrs)
                      self.capture = 'src' not in self.attrs
                      self.current = []
              def handle_data(self, data):
                  if self.capture:
                      self.current.append(data)
              def handle_endtag(self, tag):
                  if tag.lower() == 'script' and self.capture:
                      script_type = self.attrs.get('type', '').lower()
                      if script_type in ('', 'text/javascript', 'application/javascript', 'module'):
                          self.scripts.append((script_type, ''.join(self.current)))
                      self.capture = False

          text = Path('index.html').read_text(encoding='utf-8')
          assert 'async function toggleFullscreen()' in text
          parser = Scripts()
          parser.feed(text)
          with tempfile.TemporaryDirectory() as tmp:
              for index, (script_type, source) in enumerate(parser.scripts):
                  if not source.strip():
                      continue
                  suffix = '.mjs' if script_type == 'module' else '.js'
                  script = Path(tmp) / f'script-{index}{suffix}'
                  script.write_text(source, encoding='utf-8')
                  subprocess.run(['node', '--check', str(script)], check=True)
          PY

      - name: Commit repaired index
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Restore ribbon runtime after onboarding update'
          git push origin HEAD:feature/revised-ribbon-ui
