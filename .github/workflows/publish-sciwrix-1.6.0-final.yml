name: Publish Sciwrix 1.6.0 final

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: '1.6.0'
      VERSION_CODE: '15'
      TAG: 'v1.6.0'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore missing showToast helper
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '    function showToast(message) {'
          anchor = '    async function toggleFullscreen() {'

          if marker not in text:
              if text.count(anchor) != 1:
                  raise SystemExit(f'Expected one toggleFullscreen anchor, found {text.count(anchor)}')
              helper = '''    function showToast(message) {
              clearTimeout(toastTimer);
              if (!toast) return;
              toast.textContent = String(message || '');
              toast.classList.add('show');
              toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

'''
              text = text.replace(anchor, helper + anchor, 1)
              path.write_text(text, encoding='utf-8')

          if marker not in path.read_text(encoding='utf-8'):
              raise SystemExit('showToast helper was not restored')
          PY

      - name: Run Sciwrix smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit runtime fix to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'showToast helper already present on main.'
          else
            git commit -m 'Restore showToast runtime helper'
            git push origin HEAD:main
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release notices
        run: |
          test -s LICENSE
          test -s NOTICE
          test -s THIRD_PARTY_NOTICES.md
          test -s WICKED_GOOD_XPATH_LICENSE.txt

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for value_name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!value_name:-}" ]]; then
              echo "::error::Required Android signing secret is missing: $value_name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Restore Android signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sciwrix-release.jks"
          test -s "$RUNNER_TEMP/sciwrix-release.jks"

      - name: Build signed release APK
        working-directory: android
        shell: bash
        env:
          SCIENCEMD_KEYSTORE_PATH: ${{ runner.temp }}/sciwrix-release.jks
          SCIENCEMD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIENCEMD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIENCEMD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon :app:clean :app:lintRelease :app:assembleRelease \
            -PSCIENCEMD_VERSION_NAME="$VERSION_NAME" \
            -PSCIENCEMD_VERSION_CODE="$VERSION_CODE"

      - name: Verify, package and checksum release files
        id: package
        shell: bash
        run: |
          set -euo pipefail
          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          release_dir="$RUNNER_TEMP/sciwrix-release"
          mkdir -p "$release_dir"
          cp "$source_apk" "$release_dir/Sciwrix-v${VERSION_NAME}.apk"
          cp "$source_apk" "$release_dir/Sciwrix.apk"
          cp index.html "$release_dir/Sciwrix-v${VERSION_NAME}.html"
          cp index.html "$release_dir/Sciwrix.html"
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs "$release_dir/Sciwrix-v${VERSION_NAME}.apk"
          (
            cd "$release_dir"
            sha256sum \
              "Sciwrix-v${VERSION_NAME}.apk" \
              "Sciwrix.apk" \
              "Sciwrix-v${VERSION_NAME}.html" \
              "Sciwrix.html" \
              > "Sciwrix-v${VERSION_NAME}-SHA256SUMS.txt"
          )
          echo "dir=$release_dir" >> "$GITHUB_OUTPUT"

      - name: Upload signed release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sciwrix-v1.6.0
          path: |
            ${{ steps.package.outputs.dir }}/*
            LICENSE
            NOTICE
            THIRD_PARTY_NOTICES.md
            WICKED_GOOD_XPATH_LICENSE.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_DIR: ${{ steps.package.outputs.dir }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::GitHub Release $TAG already exists"
            exit 1
          fi
          gh release create "$TAG" \
            "$RELEASE_DIR/Sciwrix-v${VERSION_NAME}.apk" \
            "$RELEASE_DIR/Sciwrix.apk" \
            "$RELEASE_DIR/Sciwrix-v${VERSION_NAME}.html" \
            "$RELEASE_DIR/Sciwrix.html" \
            "$RELEASE_DIR/Sciwrix-v${VERSION_NAME}-SHA256SUMS.txt" \
            LICENSE NOTICE THIRD_PARTY_NOTICES.md WICKED_GOOD_XPATH_LICENSE.txt \
            --target main \
            --title "Sciwrix $TAG" \
            --generate-notes
