name: Diagnose New document

on:
  push:
    paths:
      - .github/workflows/diagnose-new-document.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract New document code
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          source = Path('index.html').read_text(encoding='utf-8').splitlines()
          patterns = [
              re.compile(r'starterText', re.I),
              re.compile(r'new document', re.I),
              re.compile(r'newDocument', re.I),
              re.compile(r'confirm\s*\(', re.I),
              re.compile(r'create new', re.I),
          ]

          hits = []
          for i, line in enumerate(source):
              if any(pattern.search(line) for pattern in patterns):
                  hits.append(i)

          ranges = []
          for i in hits:
              start = max(0, i - 25)
              end = min(len(source), i + 31)
              if ranges and start <= ranges[-1][1] + 1:
                  ranges[-1] = (ranges[-1][0], max(ranges[-1][1], end))
              else:
                  ranges.append((start, end))

          output = []
          for start, end in ranges:
              output.append(f'--- lines {start + 1}-{end} ---')
              output.extend(f'{n + 1}: {source[n]}' for n in range(start, end))
              output.append('')

          Path('tools/new-document-diagnostic.txt').write_text('\n'.join(output), encoding='utf-8')
          print(f'Found {len(hits)} matching lines in {len(ranges)} ranges.')
          PY

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/new-document-diagnostic.txt
          git commit -m "Add New document diagnostic" || exit 0
          git push
